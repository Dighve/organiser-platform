name: Backend CI/CD

on:
  push:
    branches: [staging, main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  JAVA_VERSION: '21'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: outmeets_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: backend
        run: chmod +x gradlew

      - name: Run Checkstyle
        working-directory: backend
        run: ./gradlew checkstyleMain checkstyleTest
        continue-on-error: true

      - name: Run tests
        working-directory: backend
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/outmeets_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Generate test report
        if: always()
        working-directory: backend
        run: ./gradlew jacocoTestReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/build/reports/tests/test/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/build/reports/jacoco/test/
          retention-days: 7

      - name: Check test coverage
        working-directory: backend
        run: |
          ./gradlew jacocoTestCoverageVerification || true
          echo "Test coverage check completed"

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    strategy:
      matrix:
        environment: [staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: backend
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: backend
        run: ./gradlew build -x test
        env:
          SPRING_PROFILES_ACTIVE: ${{ matrix.environment }}

      - name: Verify build artifacts
        working-directory: backend
        run: |
          if ! compgen -G "build/libs/*.jar" > /dev/null; then
            echo "❌ Build failed: JAR file not found"
            exit 1
          fi
          echo "✅ Build artifacts verified"
          ls -lh build/libs/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-${{ matrix.environment }}
          path: backend/build/libs/*.jar
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: backend
        run: chmod +x gradlew

      - name: Run dependency check
        working-directory: backend
        run: |
          ./gradlew dependencyCheckAnalyze || true
          echo "Dependency check completed"

      - name: Check for hardcoded secrets
        working-directory: backend
        run: |
          if grep -r "password\|secret\|api_key" src/main/resources/ --exclude="*.example" | grep -v "placeholder"; then
            echo "⚠️ Warning: Potential hardcoded secrets found"
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Check for SQL injection vulnerabilities
        working-directory: backend
        run: |
          if grep -r "createNativeQuery\|createQuery" src/ | grep -v "@Query"; then
            echo "⚠️ Warning: Potential SQL injection vulnerabilities"
          else
            echo "✅ No obvious SQL injection vulnerabilities"
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://organiser-platform.onrender.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build-staging
          path: backend/build/libs/

      - name: Deploy to Render (Staging)
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json"
          echo "✅ Deploy triggered successfully"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://organiser-platform.onrender.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build-production
          path: backend/build/libs/

      - name: Deploy to Render (Production)
        run: |
          curl -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json"
          echo "✅ Deploy triggered successfully"

      - name: Notify deployment
        run: |
          echo "✅ Production backend deployed!"
          echo "API URL: https://organiser-platform.onrender.com"
          echo "Commit: ${{ github.sha }}"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/staging'
    
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Check API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://organiser-platform.onrender.com/api/v1/actuator/health)
          if [ $STATUS -eq 200 ]; then
            echo "✅ API is healthy"
          else
            echo "❌ API health check failed with status $STATUS"
            exit 1
          fi

      - name: Check database connection
        run: |
          RESPONSE=$(curl -s https://organiser-platform.onrender.com/api/v1/actuator/health)
          if echo "$RESPONSE" | grep -q "UP"; then
            echo "✅ Database connection is healthy"
          else
            echo "❌ Database connection check failed"
            exit 1
          fi

      - name: Test critical endpoints
        run: |
          ENDPOINTS=("/api/v1/events/public" "/api/v1/groups/public" "/api/v1/activities/public")
          for ENDPOINT in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://organiser-platform.onrender.com$ENDPOINT")
            if [ $STATUS -eq 200 ]; then
              echo "✅ $ENDPOINT is accessible"
            else
              echo "❌ $ENDPOINT returned status $STATUS"
              exit 1
            fi
          done
