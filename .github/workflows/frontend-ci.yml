name: Frontend CI/CD

on:
  push:
    branches: [staging, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [staging]
    paths:
      - 'frontend/**'

env:
  NODE_VERSION: '18'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint
        continue-on-error: false

      - name: Check for console.log statements
        working-directory: frontend
        run: |
          if grep -r "console\.log" src/ --exclude-dir=node_modules --exclude="*.test.*" --exclude="analytics.js"; then
            echo "❌ Found console.log statements in production code"
            exit 1
          else
            echo "✅ No console.log statements found"
          fi

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    strategy:
      matrix:
        environment: [staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create environment file
        working-directory: frontend
        run: |
          if [ "${{ matrix.environment }}" == "staging" ]; then
            echo "VITE_API_URL=https://organiser-platform.onrender.com/api/v1" > .env.production
          else
            echo "VITE_API_URL=${{ secrets.PRODUCTION_API_URL }}" > .env.production
          fi

      - name: Build application
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build output
        working-directory: frontend
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi
          
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed - index.html not found"
            exit 1
          fi
          
          echo "✅ Build successful"
          echo "Build size:"
          du -sh dist/

      - name: Analyze bundle size
        working-directory: frontend
        run: |
          BUNDLE_SIZE=$(du -sb dist/ | cut -f1)
          MAX_SIZE=$((10 * 1024 * 1024)) # 10MB
          
          if [ $BUNDLE_SIZE -gt $MAX_SIZE ]; then
            echo "⚠️ Warning: Bundle size ($BUNDLE_SIZE bytes) exceeds 10MB"
          else
            echo "✅ Bundle size OK: $BUNDLE_SIZE bytes"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ matrix.environment }}
          path: frontend/dist/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        working-directory: frontend
        run: |
          npm audit --audit-level=high || true
          echo "Security scan completed"

      - name: Check for secrets in code
        run: |
          if grep -r "sk_live_\|pk_live_\|api_key\|secret_key" frontend/src/ --exclude-dir=node_modules; then
            echo "⚠️ Warning: Potential secrets found in code"
          else
            echo "✅ No secrets detected"
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://outmeet-stage.netlify.app
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-staging
          path: frontend/dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: frontend/dist
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - Staging"
          enable-pull-request-comment: true
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://www.outmeets.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-production
          path: frontend/dist/

      - name: Deploy to Netlify (Production)
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './frontend/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deploy - ${{ github.sha }}"
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

      - name: Notify deployment
        run: |
          echo "✅ Production deployment successful!"
          echo "URL: https://www.outmeets.com"
          echo "Commit: ${{ github.sha }}"

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check staging homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.outmeets.com)
          if [ $STATUS -eq 200 ]; then
            echo "✅ Staging homepage is accessible"
          else
            echo "❌ Staging homepage returned status $STATUS"
            exit 1
          fi

      - name: Check critical pages
        run: |
          PAGES=("/events" "/groups" "/browse-groups")
          for PAGE in "${PAGES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://staging.outmeets.com$PAGE")
            if [ $STATUS -eq 200 ]; then
              echo "✅ $PAGE is accessible"
            else
              echo "❌ $PAGE returned status $STATUS"
              exit 1
            fi
          done

      - name: Check for JavaScript errors
        run: |
          RESPONSE=$(curl -s https://staging.outmeets.com)
          if echo "$RESPONSE" | grep -q "error"; then
            echo "⚠️ Warning: Potential errors detected in response"
          else
            echo "✅ No obvious errors detected"
          fi
