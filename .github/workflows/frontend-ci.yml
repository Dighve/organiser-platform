name: Frontend CI/CD

on:
  push:
    branches: [staging, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

env:
  NODE_VERSION: '18'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        # This creates two parallel builds
        environment: [staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build application
        working-directory: frontend
        run: |
          # 1. Pull variables from the Netlify Project defined in NETLIFY_SITE_ID
          # We use --context production because it pulls the "Site-wide" variables
          export $(netlify env:list --context production --plain)
          
          # 2. Handle the API URL override
          if [ "${{ matrix.environment }}" == "staging" ]; then
            echo "VITE_API_URL=https://organiser-platform.onrender.com/api/v1" > .env.production
          else
            echo "VITE_API_URL=${{ secrets.PRODUCTION_API_URL }}" > .env.production
          fi
          
          # 3. Vite builds the project and injects all VITE_ variables it finds in the environment
          npm run build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          # SWITCHES THE PROJECT:
          NETLIFY_SITE_ID: ${{ matrix.environment == 'production' && secrets.NETLIFY_PRODUCTION_SITE_ID || secrets.NETLIFY_STAGING_SITE_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ matrix.environment }}
          path: frontend/dist/
          retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-staging
          path: frontend/dist/
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: frontend/dist
          production-deploy: true # Set to true because it's the "production" of the staging site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-production
          path: frontend/dist/
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: frontend/dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}
