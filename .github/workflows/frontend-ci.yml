name: Frontend CI/CD

on:
  push:
    branches: [staging, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

env:
  NODE_VERSION: '18'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint
        continue-on-error: false

      - name: Check for console.log statements
        working-directory: frontend
        run: |
          if grep -r "console\.log" src/ --exclude-dir=node_modules --exclude="*.test.*" --exclude="analytics.js"; then
            echo "❌ Found console.log statements in production code"
            exit 1
          else
            echo "✅ No console.log statements found"
          fi

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        environment: [staging, production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install -g netlify-cli

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build application
        working-directory: frontend
        run: |
          netlify link --id $NETLIFY_SITE_ID
          set -a
          eval $(netlify env:list --context production --plain)
          set +a
          echo "--- Env var check ---"
          if [ -n "$VITE_GOOGLE_MAPS_API_KEY" ]; then
            echo "✅ VITE_GOOGLE_MAPS_API_KEY is set (${#VITE_GOOGLE_MAPS_API_KEY} chars)"
          else
            echo "❌ VITE_GOOGLE_MAPS_API_KEY is NOT set"
          fi
          if [ -n "$VITE_GOOGLE_CLIENT_ID" ]; then
            echo "✅ VITE_GOOGLE_CLIENT_ID is set (${#VITE_GOOGLE_CLIENT_ID} chars)"
          else
            echo "❌ VITE_GOOGLE_CLIENT_ID is NOT set"
          fi
          if [ -n "$VITE_API_URL" ]; then
            echo "✅ VITE_API_URL is set (${#VITE_API_URL} chars)"
          else
            echo "❌ VITE_API_URL is NOT set (will be set below)"
          fi
          echo "--- End env var check ---"
          if [ "${{ matrix.environment }}" == "staging" ]; then
            export VITE_API_URL="https://organiser-platform.onrender.com/api/v1"
          else
            export VITE_API_URL="${{ secrets.PRODUCTION_API_URL }}"
          fi
          npm run build
        env:
          NODE_ENV: production
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ matrix.environment == 'production' && secrets.NETLIFY_PRODUCTION_SITE_ID || secrets.NETLIFY_STAGING_SITE_ID }}
      
      - name: Check build output
        working-directory: frontend
        run: |
          if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Build successful"
          du -sh dist/

      - name: Analyze bundle size
        working-directory: frontend
        run: |
          BUNDLE_SIZE=$(du -sb dist/ | cut -f1)
          MAX_SIZE=$((10 * 1024 * 1024)) # 10MB
          if [ $BUNDLE_SIZE -gt $MAX_SIZE ]; then
            echo "⚠️ Warning: Bundle size ($BUNDLE_SIZE bytes) exceeds 10MB"
          else
            echo "✅ Bundle size OK: $BUNDLE_SIZE bytes"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ matrix.environment }}
          path: frontend/dist/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        working-directory: frontend
        run: |
          npm audit --audit-level=high || true
          echo "Security scan completed"

      - name: Check for secrets in code
        run: |
          if grep -r "sk_live_\|pk_live_\|api_key\|secret_key" frontend/src/ --exclude-dir=node_modules; then
            echo "⚠️ Warning: Potential secrets found in code"
          else
            echo "✅ No secrets detected"
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://outmeet-stage.netlify.app
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-staging
          path: frontend/dist/
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: frontend/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Staging Deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://www.outmeets.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-production
          path: frontend/dist/
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: frontend/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production Deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Wait for deployment
        run: sleep 30
      - name: Check staging homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://outmeet-stage.netlify.app)
          if [ $STATUS -eq 200 ]; then
            echo "✅ Staging homepage is accessible"
          else
            echo "❌ Staging homepage returned status $STATUS"
            exit 1
          fi

      - name: Check critical pages
        run: |
          PAGES=("/events" "/groups" "/browse-groups")
          for PAGE in "${PAGES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://outmeet-stage.netlify.app$PAGE")
            if [ $STATUS -eq 200 ]; then
              echo "✅ $PAGE is accessible"
            else
              echo "❌ $PAGE returned status $STATUS"
              exit 1
            fi
          done
