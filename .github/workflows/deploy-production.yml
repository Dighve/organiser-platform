name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ Confirmation input must be exactly: deploy"
            exit 1
          fi
          echo "✅ Confirmed — proceeding with production deployment"

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: outmeets_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: backend
        run: chmod +x gradlew

      - name: Run tests
        working-directory: backend
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/outmeets_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Build JAR
        working-directory: backend
        run: ./gradlew build -x test
        env:
          SPRING_PROFILES_ACTIVE: production

      - name: Verify build artifacts
        working-directory: backend
        run: |
          if ! compgen -G "build/libs/*.jar" > /dev/null; then
            echo "❌ Build failed: JAR not found"
            exit 1
          fi
          echo "✅ JAR verified"
          ls -lh build/libs/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install -g netlify-cli

      - name: Build application
        working-directory: frontend
        run: |
          netlify link --id $NETLIFY_SITE_ID
          set -a
          eval $(netlify env:list --context production --plain)
          set +a
          export VITE_API_URL="${{ secrets.PRODUCTION_API_URL }}"
          npm run build
        env:
          NODE_ENV: production
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

      - name: Verify build output
        working-directory: frontend
        run: |
          if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
            echo "❌ Frontend build failed"
            exit 1
          fi
          echo "✅ Frontend build verified"
          du -sh dist/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-production
          path: frontend/dist/
          retention-days: 1

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment:
      name: production
      url: https://organiser-platform.onrender.com

    steps:
      - name: Trigger Render deploy
        run: |
          curl -f -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json"
          echo "✅ Backend deploy triggered on Render"

  deploy-frontend:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment:
      name: production
      url: https://www.outmeets.com

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-production
          path: frontend/dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: frontend/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Manual production deploy from ${{ github.actor }} @ ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PRODUCTION_SITE_ID }}

  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Wait for Render to come up
        run: sleep 90

      - name: Check API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://organiser-platform.onrender.com/api/v1/actuator/health)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Backend healthy"
          else
            echo "❌ Backend health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.outmeets.com)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Frontend healthy"
          else
            echo "❌ Frontend health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "🚀 Production deployment complete"
          echo "Deployed by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Backend: https://organiser-platform.onrender.com"
          echo "Frontend: https://www.outmeets.com"
