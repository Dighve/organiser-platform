<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate PWA Icons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .preview {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .icon-preview {
            text-align: center;
        }
        canvas {
            border: 1px solid #ddd;
            margin: 10px 0;
        }
        button {
            background: linear-gradient(135deg, #9333EA 0%, #EC4899 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            opacity: 0.9;
        }
        .instructions {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🏔️ OutMeets PWA Icon Generator</h1>
    
    <div class="instructions">
        <h3>Instructions:</h3>
        <ol>
            <li>Click the buttons below to download each icon size</li>
            <li>Replace the existing files in the <code>/public</code> folder:
                <ul>
                    <li><code>icon-192.png</code></li>
                    <li><code>icon-512.png</code></li>
                    <li><code>apple-touch-icon.png</code></li>
                </ul>
            </li>
            <li>Rebuild your app and test the PWA</li>
        </ol>
    </div>

    <div class="preview">
        <div class="icon-preview">
            <h3>192x192</h3>
            <canvas id="canvas192" width="192" height="192"></canvas>
            <br>
            <button onclick="downloadIcon(192)">Download icon-192.png</button>
        </div>
        <div class="icon-preview">
            <h3>512x512</h3>
            <canvas id="canvas512" width="512" height="512"></canvas>
            <br>
            <button onclick="downloadIcon(512)">Download icon-512.png</button>
        </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <button onclick="downloadIcon(180)" style="background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%);">
            Download apple-touch-icon.png (180x180)
        </button>
    </div>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            const scale = size / 48;
            
            // White background
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, size, size);
            
            // Mountain 1 (left) - Yellow
            ctx.fillStyle = 'rgba(251, 191, 36, 0.95)';
            ctx.beginPath();
            ctx.moveTo(2 * scale, 44 * scale);
            ctx.lineTo(14 * scale, 24 * scale);
            ctx.lineTo(24 * scale, 44 * scale);
            ctx.closePath();
            ctx.fill();
            
            // Mountain 2 (center) - Orange
            ctx.fillStyle = 'rgba(245, 158, 11, 0.95)';
            ctx.beginPath();
            ctx.moveTo(14 * scale, 44 * scale);
            ctx.lineTo(26 * scale, 18 * scale);
            ctx.lineTo(38 * scale, 44 * scale);
            ctx.closePath();
            ctx.fill();
            
            // Mountain 3 (right) - Light yellow
            ctx.fillStyle = 'rgba(253, 230, 138, 0.9)';
            ctx.beginPath();
            ctx.moveTo(26 * scale, 44 * scale);
            ctx.lineTo(36 * scale, 28 * scale);
            ctx.lineTo(46 * scale, 44 * scale);
            ctx.closePath();
            ctx.fill();
            
            // Hiker figure - Dark gray for better visibility
            ctx.fillStyle = 'rgba(51, 51, 51, 0.98)';
            
            // Head
            ctx.beginPath();
            ctx.arc(32 * scale, 32 * scale, 3 * scale, 0, Math.PI * 2);
            ctx.fill();
            
            // Body
            ctx.fillRect(31 * scale, 35 * scale, 2 * scale, 7 * scale);
            
            // Left leg
            ctx.save();
            ctx.translate(30 * scale, 40 * scale);
            ctx.rotate(-20 * Math.PI / 180);
            ctx.fillRect(0, 0, 1.5 * scale, 6 * scale);
            ctx.restore();
            
            // Right leg
            ctx.save();
            ctx.translate(33 * scale, 40 * scale);
            ctx.rotate(20 * Math.PI / 180);
            ctx.fillRect(0, 0, 1.5 * scale, 6 * scale);
            ctx.restore();
            
            // Hiking stick
            ctx.save();
            ctx.translate(32.5 * scale, 36 * scale);
            ctx.rotate(-30 * Math.PI / 180);
            ctx.fillRect(0, 0, 1 * scale, 6 * scale);
            ctx.restore();
        }
        
        // Draw icons on page load
        drawIcon(document.getElementById('canvas192'), 192);
        drawIcon(document.getElementById('canvas512'), 512);
        
        function downloadIcon(size) {
            // Create a temporary canvas
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            drawIcon(canvas, size);
            
            // Convert to blob and download
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                if (size === 180) {
                    a.download = 'apple-touch-icon.png';
                } else {
                    a.download = `icon-${size}.png`;
                }
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        }
    </script>
</body>
</html>
