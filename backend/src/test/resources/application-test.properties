# Test configuration for PostgreSQL (matches production database)
# Note: In CI/CD, these values are overridden by environment variables
spring.datasource.url=jdbc:postgresql://localhost:5432/outmeets_test
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Disable Flyway for tests (use JPA schema generation)
spring.flyway.enabled=false

# JWT Configuration
jwt.secret=testSecretKey1234567890123456789012345678901234567890
jwt.expiration=86400000

# Mail Configuration
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@example.com
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.organiser=DEBUG
