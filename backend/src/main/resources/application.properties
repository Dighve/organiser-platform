# Active Profile (default to dev for local development)
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/organiser_platform}
spring.datasource.username=${DATABASE_USERNAME:organiser_user}
spring.datasource.password=${DATABASE_PASSWORD:organiser_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Transaction timeout (10 seconds) to prevent hanging
spring.transaction.default-timeout=10
spring.jpa.properties.jakarta.persistence.query.timeout=10000
spring.jpa.properties.hibernate.query.timeout=10000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/postgresql
spring.flyway.baseline-on-migrate=true

# JWT Configuration
jwt.secret=${JWT_SECRET:dev-secret-key-minimum-32-characters-long-for-hs256-algorithm}
jwt.expiration=86400000
jwt.refresh-expiration=7776000000

# Server Configuration
server.port=${PORT:8080}
server.compression.enabled=true

# Logging
logging.level.root=INFO
# Enable DEBUG logging for authentication services
logging.level.com.organiser.platform.service.AuthService=DEBUG
logging.level.com.organiser.platform.controller.AuthController=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.com.organiser.platform.service.EmailService=DEBUG

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/api/v1/actuator
management.health.defaults.enabled=true
management.health.db.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.liveness.include=livenessState

# CORS Configuration - Local Development
# Includes all localhost ports for local development
cors.allowed-origins=http://localhost:3000,http://localhost:3002,http://localhost:3003,http://127.0.0.1:3002,http://localhost:5173,http://192.168.0.114:3000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Configuration (for image uploads)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:demo}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}

# Web Push (VAPID) - override via env vars
push-vapid.public=${PUSH_VAPID_PUBLIC:}
push-vapid.private=${PUSH_VAPID_PRIVATE:}
push-vapid.subject=mailto:support@outmeets.com
